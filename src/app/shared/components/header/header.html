<header class="header">
  <div class="logo">Agência de Viagens</div>
  <nav class="menu">
    <a routerLink="/">Home</a>
    @if (autenticado) {
    <a routerLink="/cadastrar-viagem">Cadastrar Viagem</a>
    <a routerLink="/viagens">Listar Viagens</a>
    <span class="user-name">
      {{ userName }}
    </span>
    <button type="button" class="logout-btn" (click)="logout()">
      Sair
    </button>
    } @else {
    <a routerLink="/login">Login</a>
    }
  </nav>
</header>
